<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万能AI列填充器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font: 13px/1.6 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; color: #1f2329; background: #f5f6f7; padding: 12px; }
  h1 { font-size: 15px; margin-bottom: 2px; }
  .sub { color: #8f959e; font-size: 11px; margin-bottom: 10px; }
  .card { background: #fff; border: 1px solid #e5e6eb; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
  .card h2 { font-size: 12px; color: #646a73; margin-bottom: 8px; }
  label { display: block; font-size: 12px; color: #646a73; margin: 8px 0 3px; }
  input[type=text], input[type=password], input[type=number], select, textarea {
    width: 100%; padding: 6px 8px; border: 1px solid #dee0e3; border-radius: 6px; font-size: 12px; background: #fff;
  }
  textarea { min-height: 96px; resize: vertical; font-family: inherit; }
  .row { display: flex; gap: 6px; }
  .row > * { flex: 1; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip { border: 1px solid #dee0e3; border-radius: 12px; padding: 2px 10px; font-size: 12px; cursor: pointer; user-select: none; background: #fff; }
  .chip.on { background: #e8f3ff; border-color: #3370ff; color: #3370ff; }
  button.primary { width: 100%; background: #3370ff; color: #fff; border: 0; border-radius: 6px; padding: 8px; font-size: 13px; cursor: pointer; margin-top: 8px; }
  button.ghost { width: 100%; background: #fff; color: #3370ff; border: 1px solid #3370ff; border-radius: 6px; padding: 6px; font-size: 12px; cursor: pointer; margin-top: 6px; }
  button.stop { background: #f54a45; }
  #log { background: #16191d; color: #c9d1d9; border-radius: 6px; padding: 8px; font: 11px/1.5 Menlo, monospace; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; margin-top: 8px; display: none; }
  .hint { font-size: 11px; color: #8f959e; margin-top: 4px; }
  .err { color: #f54a45; font-size: 12px; }
</style>
</head>
<body>
<h1>🔌 多维表格 · 自定义 API 插件</h1>
<div class="sub">选输入列(产品图/提示词) → 写生图提示词 → 并发生成图片写回附件列</div>

<div class="card">
  <h2>① 模型配置（存在本机浏览器，不上传）</h2>
  <label>API 地址</label>
  <input type="text" id="apiBase" placeholder="https://api.openai.com/v1/chat/completions 或任意中转地址">
  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="sk-...">
  <label>生图模型（不确定就留空，默认 gpt-image-2）</label>
  <input type="text" id="model" list="modelList" placeholder="留空=gpt-image-2">
  <datalist id="modelList">
    <option value="gpt-image-2">gpt-image-2（默认·图生图保产品准）</option>
    <option value="doubao-seedream-4-0">豆包 Seedream 4.0</option>
  </datalist>
</div>

<div class="card">
  <h2>② 任务配置</h2>
  <label>任务类型</label>
  <select id="taskType">
    <option value="text">📝 文本生成（写进文本列，如文案/脚本）</option>
    <option value="image">🖼️ 图片生成（生成图写进附件列，如主图/分镜图）</option>
  </select>
  <div class="hint" id="imgHint" style="display:none">图片模式：模型名填生图模型（如 gpt-image-2 / doubao-seedream-4-0）；选了📎输入图=图生图(保产品)，没选=文生图。</div>
  <label>输入列（点选，可多个；📎附件列：文本模式=发图给视觉模型，图片模式=作产品参考图）</label>
  <div class="chips" id="inputChips"></div>
  <label>提示词模板（用【列名】引用输入列内容）</label>
  <textarea id="prompt" placeholder="例：你是电商专家。产品信息：【基础信息】，目标人群：【目标人群】。请输出……"></textarea>
  <label>输出列（生成的图写这里，选附件列）</label>
  <select id="outputSel"></select>
  <div class="row" id="sizeRow">
    <div>
      <label>图片尺寸</label>
      <select id="imgSize">
        <option value="1024x1536">竖版 1024×1536（主图/详情页）</option>
        <option value="1024x1024">方形 1024×1024</option>
        <option value="1536x1024">横版 1536×1024</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div>
      <label>最多处理几行</label>
      <input type="number" id="maxRows" value="10" min="1">
    </div>
    <div>
      <label>并发数(同时几行)</label>
      <input type="number" id="concurrency" value="3" min="1" max="10">
    </div>
    <div>
      <label>已有内容的行</label>
      <select id="skipMode">
        <option value="skip">跳过（推荐）</option>
        <option value="overwrite">覆盖重写</option>
      </select>
    </div>
  </div>
</div>

<button class="primary" id="runBtn">▶ 开始出图（附件列为空的行）</button>
<button class="ghost" id="runSelBtn">只跑当前光标所在行</button>
<div id="log"></div>

<script type="module">
const $ = id => document.getElementById(id);
const log = (msg, isErr) => { const el = $('log'); el.style.display='block'; el.textContent += (isErr?'✗ ':'') + msg + '\n'; el.scrollTop = el.scrollHeight; };
const sleep = ms => new Promise(r => setTimeout(r, ms));
const selectedInputs = () => [...document.querySelectorAll('.chip.on')].map(c => c.dataset.name || c.textContent.replace(/^📎/, ''));

// ── SDK 加载:内联自托管优先(国内稳),CDN兜底 ──
let bitable = null;
async function loadSDK() {
  if (window.__BITABLE__) { window.__sdkSource = '内联自托管(零外部请求)'; return window.__BITABLE__; }
  for (const u of ['https://cdn.jsdelivr.net/npm/@lark-base-open/js-sdk@1.0.2/+esm','https://esm.sh/@lark-base-open/js-sdk@1.0.2']) {
    try { const m = await import(u); if (m && m.bitable) { window.__sdkSource = 'CDN兜底:' + new URL(u).host; return m.bitable; } } catch (e) {}
  }
  return null;
}

// ── 配置持久化 ──
const CFG_KEY = 'ai-filler-cfg';
const saveCfg = () => localStorage.setItem(CFG_KEY, JSON.stringify({
  apiBase: $('apiBase').value, apiKey: $('apiKey').value, model: $('model').value, prompt: $('prompt').value,
  inputs: [...document.querySelectorAll('.chip.on')].map(c => c.textContent),
  output: $('outputSel').value, concurrency: $('concurrency').value, maxRows: $('maxRows').value, imgSize: $('imgSize').value,
}));
const loadCfg = () => { try { return JSON.parse(localStorage.getItem(CFG_KEY)) || {}; } catch { return {}; } };

// ── 全局状态 ──
let table = null, tableId = null, fieldMetas = [];
let running = false, stopFlag = false;
const aborters = new Set();
const MAX_IMGS_PER_ROW = 3;
const REQ_TIMEOUT_MS = 200000;   // 单请求硬超时:防上游API空转,超时即断,绝不重试

async function refreshTable() {
  table = await bitable.base.getActiveTable();
  tableId = table.id;
  const name = await table.getName();
  document.querySelector('.sub').textContent = '当前表：' + name + (window.__sdkSource ? ' · SDK:' + window.__sdkSource : '');
  fieldMetas = await table.getFieldMetaList();
  const cfg = loadCfg();
  const chips = $('inputChips'); chips.innerHTML = '';
  for (const f of fieldMetas) {
    const c = document.createElement('span');
    const label = (f.type === 17 ? '📎' : '') + f.name;
    c.className = 'chip' + ((cfg.inputs || []).includes(label) ? ' on' : '');
    c.textContent = label; c.dataset.name = f.name;
    c.onclick = () => { c.classList.toggle('on'); saveCfg(); };
    chips.appendChild(c);
  }
  const sel = $('outputSel'); sel.innerHTML = '';
  const fs = fieldMetas.filter(f => f.type === 17);   // 输出=附件列
  for (const f of fs) { const o = document.createElement('option'); o.value = f.id; o.textContent = f.name; if (cfg.output === f.id) o.selected = true; sel.appendChild(o); }
  if (!fs.length) { const o = document.createElement('option'); o.value = ''; o.textContent = '(本表没有附件列,请先建一个附件字段)'; sel.appendChild(o); }
}

async function init() {
  bitable = await loadSDK();
  if (!bitable) { document.body.innerHTML = '<p class="err">SDK 加载失败：请刷新重试;反复失败请联系发布者。</p>'; return; }
  const cfg = loadCfg();
  $('apiBase').value = cfg.apiBase || '';
  $('apiKey').value = cfg.apiKey || '';
  $('model').value = cfg.model || '';
  $('prompt').value = cfg.prompt || '';
  if (cfg.concurrency) $('concurrency').value = cfg.concurrency;
  if (cfg.maxRows) $('maxRows').value = cfg.maxRows;
  if (cfg.imgSize) $('imgSize').value = cfg.imgSize;
  await refreshTable();
  ['apiBase','apiKey','model','prompt','outputSel','concurrency','maxRows','imgSize'].forEach(id => $(id).addEventListener('change', saveCfg));
  try {
    bitable.base.onSelectionChange(async () => {
      if (running) return;
      try { const s = await bitable.base.getSelection(); if (s && s.tableId && s.tableId !== tableId) { await refreshTable(); log('检测到切换数据表,字段已刷新'); } } catch (e) {}
    });
  } catch (e) {}
}

function fieldMetaByName(name) { return fieldMetas.find(f => f.name === name) || {}; }

async function listRecordIds() {
  try {
    const view = await table.getActiveView();
    if (typeof view.getVisibleRecordIdListByPage === 'function') {
      const ids = []; let pageToken;
      for (let g = 0; g < 100; g++) {
        const r = await view.getVisibleRecordIdListByPage(pageToken ? { pageToken, pageSize: 200 } : { pageSize: 200 });
        (r.recordIds || []).forEach(x => x && ids.push(x));
        if (!r.hasMore || !r.pageToken) break;
        pageToken = r.pageToken;
      }
      if (ids.length) return ids;
    }
    const v = await view.getVisibleRecordIdList();
    if (v && v.filter(Boolean).length) return v.filter(Boolean);
  } catch (e) {}
  return (await table.getRecordIdList()).filter(Boolean);
}

// 输出附件格是否已填
async function cellFilled(fid, rid) { const v = await table.getCellValue(fid, rid).catch(() => null); return Array.isArray(v) && v.length > 0; }

// 该行选中的输入列是否真有内容(轻量,不取附件URL);没选输入列则靠模板→返回true不按行过滤
async function hasInput(rid) {
  const cols = selectedInputs().map(fieldMetaByName);
  if (!cols.length) return !!$('prompt').value.trim();
  for (const meta of cols) {
    if (meta.type === 17) { const c = await table.getCellValue(meta.id, rid).catch(() => null); if (Array.isArray(c) && c.some(a => ((a && a.type) || '').startsWith('image/'))) return true; }
    else { const s = await table.getCellString(meta.id, rid).catch(() => ''); if (s && s.trim()) return true; }
  }
  return false;
}

// 拼提示词(模板可留空:留空则用所选文本列内容当提示词) + 收参考图URL
async function buildInput(recordId) {
  const tpl = $('prompt').value;
  let text = tpl;
  const extra = []; const imageUrls = [];
  for (const n of selectedInputs()) {
    const meta = fieldMetaByName(n);
    if (meta.type === 17) {
      try {
        const cell = await table.getCellValue(meta.id, recordId);
        const imgs = (cell || []).filter(a => ((a && a.type) || '').startsWith('image/'));
        for (const att of imgs) {
          if (imageUrls.length >= MAX_IMGS_PER_ROW) break;
          try { const u = await table.getAttachmentUrl(att.token, meta.id, recordId); if (u) imageUrls.push(u); }
          catch { try { const u = await table.getAttachmentUrl(att.token); if (u) imageUrls.push(u); } catch {} }
        }
      } catch {}
    } else {
      let v = ''; try { v = (await table.getCellString(meta.id, recordId)) || ''; } catch {}
      v = v.trim();
      if (tpl.includes('【' + n + '】')) text = text.split('【' + n + '】').join(v);
      else if (v) extra.push(v);   // 未被模板引用的文本列→当提示词内容
    }
  }
  let prompt = text.trim();
  if (extra.length) prompt = prompt ? prompt + '\n' + extra.join('\n') : extra.join('\n');
  if (!imageUrls.length && !prompt) return null;   // 既无参考图也无提示词→不生成
  return { text: prompt, imageUrls };
}

function imagesEndpoint(kind) { const b = $('apiBase').value.replace(/\/chat\/completions.*$/, '').replace(/\/+$/, ''); return b + '/images/' + kind; }

async function callImage(input, signal) {
  const { text, imageUrls } = input;
  const size = $('imgSize').value || '1024x1536';
  const model = $('model').value.trim() || 'gpt-image-2';
  const edit = imageUrls.length > 0;   // 有参考图→图生图(保产品),否则文生图
  const url = imagesEndpoint(edit ? 'edits' : 'generations');
  const auth = 'Bearer ' + $('apiKey').value;
  const body = edit ? { model, image: imageUrls[0], prompt: text, size }
                    : { model, prompt: text, size };
  let resp = await fetch(url, { method: 'POST', signal, headers: { 'Content-Type': 'application/json', 'Authorization': auth }, body: JSON.stringify(body) });
  if (edit && [400, 404, 415, 422].includes(resp.status)) {
    // 图生图兼容:中转普遍收 image=URL,OpenAI 官方/严格端点只收 multipart 文件→下载参考图转文件上传重试(4xx 未生成未扣费,重试安全)
    const jsonErr = (await resp.text()).slice(0, 200);
    const img = await fetch(imageUrls[0], { signal }).catch(() => null);
    if (!img || !img.ok) throw new Error('生图API ' + resp.status + ': ' + jsonErr);
    const blob = await img.blob();
    const fd = new FormData();
    fd.append('model', model); fd.append('prompt', text); fd.append('size', size);
    fd.append('image', new File([blob], 'ref.png', { type: blob.type || 'image/png' }));
    resp = await fetch(url, { method: 'POST', signal, headers: { 'Authorization': auth }, body: fd });
  }
  if (!resp.ok) throw new Error('生图API ' + resp.status + ': ' + (await resp.text()).slice(0, 200));
  const data = await resp.json();
  const first = data.data && data.data[0];
  if (first && first.b64_json) return { b64: first.b64_json, edit };
  if (first && first.url) return { url: first.url, edit };
  throw new Error('生图返回无 b64/url: ' + JSON.stringify(data).slice(0, 180));
}

async function writeImage(fid, rid, res, signal) {
  let bytes;
  if (res.b64) { const bin = atob(res.b64); bytes = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i); }
  else { const r = await fetch(res.url, { signal }); if (!r.ok) throw new Error('下载生成图失败 ' + r.status); bytes = new Uint8Array(await r.arrayBuffer()); }
  const file = new File([bytes], 'ai_' + rid.slice(-6) + '_' + Date.now() + '.png', { type: 'image/png' });
  const tokens = await bitable.base.batchUploadFile([file]);
  const val = [{ name: file.name, size: file.size, type: file.type, token: tokens[0], timeStamp: file.lastModified || Date.now() }];
  await table.setCellValue(fid, rid, val);
  return file.size;
}

// ── 并发池 ──
async function processRecords(recordIds) {
  const outFid = $('outputSel').value;
  const conc = Math.max(1, Math.min(10, parseInt($('concurrency').value) || 3));
  let done = 0, skip = 0, fail = 0, idx = 0;
  const worker = async (wi) => {
    await sleep(wi * 300);
    while (!stopFlag) {
      const i = idx++;
      if (i >= recordIds.length) return;
      const rid = recordIds[i];
      try {
        if ($('skipMode').value === 'skip' && await cellFilled(outFid, rid)) { skip++; log('· 行' + rid.slice(-6) + ' 已有图,跳过'); continue; }
        const input = await buildInput(rid);
        if (!input) { skip++; log('· 行' + rid.slice(-6) + ' 无参考图/无提示词,跳过'); continue; }
        const ac = new AbortController(); aborters.add(ac);
        const timer = setTimeout(() => ac.abort(), REQ_TIMEOUT_MS);   // 硬超时防空转
        try {
          const res = await callImage(input, ac.signal);
          const sz = await writeImage(outFid, rid, res, ac.signal);
          done++;
          log('✅ 行' + rid.slice(-6) + ' 出图完成(' + (res.edit ? '图生图' : '文生图') + '·' + Math.round(sz / 1024) + 'KB)');
        } finally { clearTimeout(timer); aborters.delete(ac); }
      } catch (e) {
        fail++;
        log('行' + rid.slice(-6) + ' ' + (e.name === 'AbortError' ? '超时/已停止(不重试)' : e.message), 1);
      }
    }
  };
  await Promise.allSettled(Array.from({ length: Math.min(conc, recordIds.length) }, (_, i) => worker(i)));
  log('── 完成: 成功' + done + ' / 跳过' + skip + ' / 失败' + fail + (stopFlag ? ' (手动停止)' : '') + ' ──');
}

async function guardedRun(getTargets, allowStopToggle) {
  if (running) {
    if (allowStopToggle) { stopFlag = true; aborters.forEach(a => a.abort()); log('⏹ 停止中…在途请求已中断'); }
    else log('正在运行中,先停止再试', 1);
    return;
  }
  if (!$('apiKey').value) { log('请先填 API Key', 1); return; }
  if (!$('outputSel').value) { log('请先在表里建一个"附件"字段当输出列', 1); return; }
  if (!$('prompt').value.trim() && !selectedInputs().length) { log('请写生图提示词,或选一个含提示词/产品图的输入列', 1); return; }
  saveCfg();
  running = true; stopFlag = false;
  const btn = $('runBtn'); btn.textContent = '⏹ 点击停止'; btn.classList.add('stop');
  try {
    try { const sel = await bitable.base.getSelection(); if (sel && sel.tableId && sel.tableId !== tableId) { await refreshTable(); log('检测到切换了数据表,字段已刷新——请重新确认后再点', 1); return; } } catch (e) {}
    const targets = await getTargets();
    if (!targets || !targets.length) { if (!stopFlag) log('没有待处理的行(输出已填 或 输入为空)'); return; }
    log('待处理 ' + targets.length + ' 行,并发 ' + ($('concurrency').value || 3));
    await processRecords(targets);
  } catch (e) { log('运行出错: ' + e.message, 1); }
  finally { running = false; stopFlag = false; btn.textContent = '▶ 开始出图（附件列为空的行）'; btn.classList.remove('stop'); }
}

$('runBtn').onclick = () => guardedRun(async () => {
  const all = await listRecordIds();
  const max = parseInt($('maxRows').value) || 10;
  const outFid = $('outputSel').value;
  const targets = [];
  for (const rid of all) {
    if (stopFlag) break;
    if (targets.length >= max) break;
    if ($('skipMode').value !== 'overwrite' && await cellFilled(outFid, rid)) continue;   // 输出已填→跳
    if (!(await hasInput(rid))) continue;   // ★输入为空→不排任务
    targets.push(rid);
  }
  return targets;
}, true);

$('runSelBtn').onclick = () => guardedRun(async () => {
  const sel = await bitable.base.getSelection();
  if (!sel || !sel.recordId) { log('请先在表里点选一个单元格定位到某一行', 1); return []; }
  return [sel.recordId];
}, false);

init();
</script>
</body>
</html>
